<main class="home-page" role="main">
  <section class="home-hero" aria-labelledby="home-title">
    <div class="home-hero__inner">
      <h1 id="home-title">Welcome to HomeStyle</h1>
      <p class="home-desc">
        Thoughtfully selected furniture and home accessories to make your space feel
        lived-in and loved. Find beautiful, affordable pieces organized by category.
      </p>
      <div class="home-cta-row">
        <a class="home-cta" [routerLink]="['/products']">Browse All Products</a>
        <a class="home-cta home-cta--ghost" [routerLink]="['/products']" [queryParams]="{ category: 1 }">Shop Living Room</a>
      </div>
    </div>
  </section>

  <section class="home-cats" aria-labelledby="cats-title">
    <h2 id="cats-title">Shop by Category</h2>
    <div class="home-grid">
      <a
        class="home-tile"
        *ngFor="let c of categories"
        [routerLink]="['/products']"
        [queryParams]="{ category: c.id }"
        title="View products in {{ c.name }}"
      >
        <div class="home-tile__icon">{{ c.icon }}</div>
        <div class="home-tile__name">{{ c.name }}</div>
      </a>
    </div>
  </section>
</main>
