<div class="admin-section">
  <h2>Manage Orders (Undelivered)</h2>

  <div *ngIf="success" class="success-msg">{{ success }}</div>
  <div *ngIf="error"   class="error-msg">{{ error }}</div>
  <div *ngIf="loading" class="loading">Loading orders...</div>

  <div *ngIf="!loading && pendingOrders.length === 0 && !error" class="empty">
    No pending orders 🎉
  </div>

  <div class="order-card" *ngFor="let order of pendingOrders">
    <div class="order-header">
      <span class="order-id">#{{ order.orderId }}</span>
      <span class="order-date">{{ order.orderDate }}</span>
      <span class="order-user">User #{{ order.userId }}</span>
      <span class="order-status" [ngClass]="statusClass(order.status)">{{ order.status }}</span>
    </div>

    <table class="items-table">
      <thead>
        <tr>
          <th>Product ID</th>
          <th>Quantity</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of order.orderItems">
          <td>{{ item.productId }}</td>
          <td>{{ item.quantity }}</td>
        </tr>
      </tbody>
    </table>

    <div class="order-footer">
      <span class="order-total">Total: ${{ order.orderSum | number:'1.2-2' }}</span>
      <div class="status-controls">
        <label>Change Status:
          <select (change)="changeStatus(order, $any($event.target).value)" [value]="order.status">
            <option *ngFor="let s of statuses" [value]="s">{{ s }}</option>
          </select>
        </label>
      </div>
    </div>
  </div>
</div>
