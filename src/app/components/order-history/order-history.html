<div class="orders-page">
  <h2>My Orders</h2>

  <div *ngIf="loading" class="loading">Loading orders...</div>
  <div *ngIf="error"   class="error-msg">{{ error }}</div>

  <div *ngIf="!loading && orders.length === 0 && !error" class="empty">
    You have no orders yet.
  </div>

  <div class="order-card" *ngFor="let order of orders">
    <div class="order-header">
      <span class="order-id">#{{ order.orderId }}</span>
      <span class="order-date">{{ order.orderDate }}</span>
      <span class="order-status" [ngClass]="statusClass(order.status)">{{ order.status }}</span>
    </div>

    <table class="items-table">
      <thead>
        <tr>
          <th>Product ID</th>
          <th>Quantity</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of order.orderItems">
          <td>{{ item.productId }}</td>
          <td>{{ item.quantity }}</td>
        </tr>
      </tbody>
    </table>

    <div class="order-footer">
      <span class="order-total">Total: ${{ order.orderSum | number:'1.2-2' }}</span>
      <button
        *ngIf="canMarkDelivered(order)"
        class="btn-delivered"
        (click)="markDelivered(order)">
        Mark as Delivered
      </button>
    </div>
  </div>
</div>
